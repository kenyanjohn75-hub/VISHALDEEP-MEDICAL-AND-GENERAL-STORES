<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maharashtra Medical Store</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

/* HERO */
.header {
    background: linear-gradient(135deg,#0a7d3c,#1e88e5);
    color:white;
    text-align:center;
    padding:20px;
}

.header img {
    width:90px;
    height:90px;
    border-radius:50%;
    background:white;
    padding:6px;
    margin-bottom:10px;
}

/* LANGUAGE */
.lang {
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:#eee;
}

.lang button {
    padding:6px 12px;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* SEARCH */
.search {
    width:90%;
    margin:10px auto;
    display:block;
    padding:12px;
    border-radius:20px;
    border:1px solid #ccc;
}

/* ACTION BUTTONS */
.actions {
    display:flex;
    gap:10px;
    padding:10px;
}

.actions button {
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
}

.blue {background:#1976d2;}
.green {background:#0a7d3c;}

/* PRODUCTS */
.products {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.product {
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    position:relative;
}

.product img {
    width:100%;
    height:120px;
    object-fit:cover;
}

.price {
    font-weight:bold;
    color:#0a7d3c;
}

.rx {
    position:absolute;
    top:8px;
    left:8px;
    background:red;
    color:white;
    font-size:10px;
    padding:3px 6px;
    border-radius:5px;
}

/* NAV */
.bottom-nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px;
    border-top:1px solid #ccc;
}

.bottom-nav button {
    background:none;
    border:none;
    font-size:14px;
}
</style>
</head>

<body>

<!-- LANGUAGE -->
<div class="lang">
<button onclick="setLang('en')">English</button>
<button onclick="setLang('hi')">हिंदी</button>
<button onclick="setLang('mr')">मराठी</button>
</div>

<!-- HERO WITH LOGO -->
<div class="header">
    <img src="data:image/svg+xml;utf8,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'>
    <rect width='100' height='100' fill='white'/>
    <rect x='40' y='20' width='20' height='60' fill='%230a7d3c'/>
    <rect x='20' y='40' width='60' height='20' fill='%230a7d3c'/>
    </svg>">

    <h2 id="title">Medical Store</h2>
    <p id="subtitle">Trusted Pharmacy</p>
</div>

<!-- ACTIONS -->
<div class="actions">
<button class="blue" id="doctorBtn">Doctor Help</button>
<button class="green" id="shopBtn">Shop Medicines</button>
</div>

<!-- SEARCH -->
<input class="search" id="search" placeholder="Search medicines...">

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- NAV -->
<div class="bottom-nav">
<button>Home</button>
<button>Cart</button>
</div>

<script>

/* REALISTIC INDIA MEDICINES */
const products = [
{name:"Paracetamol 650mg (Strip 10)", price:28, rx:false},
{name:"Ibuprofen 400mg (Strip 10)", price:35, rx:false},
{name:"Cough Syrup 100ml", price:95, rx:false},
{name:"Amoxicillin 500mg", price:60, rx:true},
{name:"Azithromycin 500mg", price:120, rx:true},
{name:"Vitamin C 500mg", price:110, rx:false},
{name:"Multivitamin Tablets", price:150, rx:false},
{name:"Cetirizine 10mg", price:25, rx:false}
];

function display(){
let div=document.getElementById("products");
div.innerHTML="";

products.forEach(p=>{
div.innerHTML+=`
<div class="product">
${p.rx ? '<div class="rx">RX</div>' : ''}
<img src="https://via.placeholder.com/150">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
</div>`;
});
}
display();

/* LANGUAGE SYSTEM */
const text={
en:{title:"Medical Store",subtitle:"Trusted Pharmacy",doctor:"Doctor Help",shop:"Shop Medicines"},
hi:{title:"मेडिकल स्टोर",subtitle:"विश्वसनीय फार्मेसी",doctor:"डॉक्टर सहायता",shop:"दवाइयाँ खरीदें"},
mr:{title:"मेडिकल स्टोअर",subtitle:"विश्वसनीय फार्मसी",doctor:"डॉक्टर मदत",shop:"औषधे खरेदी करा"}
};

function setLang(l){
document.getElementById("title").innerText=text[l].title;
document.getElementById("subtitle").innerText=text[l].subtitle;
document.getElementById("doctorBtn").innerText=text[l].doctor;
document.getElementById("shopBtn").innerText=text[l].shop;
}

setLang("en");

</script>

</body>
    </html>
