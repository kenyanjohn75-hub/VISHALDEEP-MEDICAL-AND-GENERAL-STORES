<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishaldeep Medical Store</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

.header {
    background: linear-gradient(135deg,#0a7d3c,#1e88e5);
    color:white;
    text-align:center;
    padding:20px;
}

.header img {
    width:85px;
    height:85px;
    border-radius:50%;
    background:white;
    padding:6px;
    margin-bottom:10px;
}

.lang {
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:#eee;
}

.lang button {
    padding:6px 12px;
    border:none;
    border-radius:20px;
}

.search {
    width:90%;
    margin:10px auto;
    display:block;
    padding:12px;
    border-radius:20px;
    border:1px solid #ccc;
}

.actions {
    display:flex;
    gap:10px;
    padding:10px;
}

.actions button {
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
}

.blue {background:#1976d2;}
.green {background:#0a7d3c;}
.gray {background:#555;}

.products {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.product {
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    position:relative;
}

.product img {
    width:100%;
    height:120px;
    object-fit:cover;
}

.price {font-weight:bold; color:#0a7d3c;}

.rx {
    position:absolute;
    top:8px;
    left:8px;
    background:red;
    color:white;
    font-size:10px;
    padding:3px 6px;
    border-radius:5px;
}

.cart {padding:10px;}

.big-btn {
    width:90%;
    margin:8px auto;
    display:block;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.float-wa {
    position:fixed;
    bottom:80px;
    right:15px;
    background:#25D366;
    color:white;
    padding:12px;
    border-radius:50%;
    font-size:20px;
}

.bottom-nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px;
    border-top:1px solid #ccc;
}
</style>
</head>

<body>

<div class="lang">
<button onclick="setLang('en')">English</button>
<button onclick="setLang('hi')">हिंदी</button>
<button onclick="setLang('mr')">मराठी</button>
</div>

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Medical_cross_symbol.svg">
<h2 id="storeName">Vishaldeep Medical Store</h2>
<p id="subtitle">Trusted Pharmacy</p>
</div>

<div class="actions">
<button class="blue" id="doctorBtn" onclick="doctorHelp()">Doctor Help</button>
<button class="green" id="shopBtn" onclick="showShop()">Shop Medicines</button>
<button class="gray" onclick="uploadPrescription()">Upload Rx</button>
</div>

<input class="search" placeholder="Search medicines..." onkeyup="search(this.value)">

<div class="products" id="products"></div>

<div class="cart" id="cartBox"></div>
<h3 style="padding:10px;" id="total"></h3>

<button class="big-btn green" onclick="checkout()">💳 Pay Now (WhatsApp Order)</button>
<button class="big-btn gray" onclick="printReceipt()">🧾 Print Receipt</button>

<div class="bottom-nav">
<button onclick="showShop()">Shop</button>
<button onclick="showCart()">Cart</button>
</div>

<div class="float-wa" onclick="doctorHelp()">💬</div>

<input type="file" id="rxUpload" accept="image/*,application/pdf" style="display:none" onchange="handleUpload(event)">

<script>

const products = [
{name:"Paracetamol 650mg", price:28, rx:false},
{name:"Ibuprofen 400mg", price:35, rx:false},
{name:"Cough Syrup", price:95, rx:false},
{name:"Amoxicillin 500mg", price:60, rx:true},
{name:"Azithromycin 500mg", price:120, rx:true},
{name:"Vitamin C", price:110, rx:false}
];

let cart = [];
let rxFile = null;

/* ADD TO CART FIX */
function add(name, price){
cart.push({name, price});
alert(name + " added to cart");
showCart();
}

/* DISPLAY */
function display(list){
let div = document.getElementById("products");
div.innerHTML = "";

list.forEach(p=>{
div.innerHTML += `
<div class="product">
${p.rx ? '<div class="rx">RX</div>' : ''}
<img src="https://via.placeholder.com/150">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<button onclick="add('${p.name}',${p.price})">Add</button>
</div>`;
});
}
display(products);

/* SEARCH */
function search(q){
let f = products.filter(p =>
p.name.toLowerCase().includes(q.toLowerCase())
);
display(f);
}

/* CART VIEW */
function showCart(){
let div = document.getElementById("cartBox");
let total = 0;
div.innerHTML = "";

cart.forEach(i=>{
total += i.price;
div.innerHTML += `<p>${i.name} - ₹${i.price}</p>`;
});

document.getElementById("total").innerText = "Total: ₹" + total;
}

/* SHOP */
function showShop(){
display(products);
}

/* RX */
function uploadPrescription(){
document.getElementById("rxUpload").click();
}

function handleUpload(e){
rxFile = e.target.files[0];
alert("RX Uploaded: " + rxFile.name);
}

/* WHATSAPP */
function doctorHelp(){
window.open("https://wa.me/919850752963","_blank");
}

/* QR GENERATOR */
function getQR(){
let url = encodeURIComponent(window.location.href);
return "https://chart.googleapis.com/chart?chs=200x200&cht=qr&chl=" + url;
}

/* CHECKOUT FIXED */
async function checkout(){

if(cart.length === 0){
alert("Cart is empty");
return;
}

let msg = "🧾 Vishaldeep Medical Store Order\n\n";
let total = 0;

cart.forEach((i,index)=>{
msg += (index+1)+". "+i.name+" - ₹"+i.price+"\n";
total += i.price;
});

msg += "\n💰 Total: ₹" + total;

let phone = "919850752963";

/* RX attach */
if(rxFile){
msg += "\n📄 RX: Attached / Uploaded";
}

msg += "\n\nScan QR to open store:\n" + window.location.href;

window.open(
"https://wa.me/"+phone+"?text="+encodeURIComponent(msg),
"_blank"
);
}

/* PRINT WITH QR */
function printReceipt(){

if(cart.length === 0){
alert("Cart is empty");
return;
}

let total = 0;
let text = "VISHALDEEP MEDICAL STORE\n\n";

cart.forEach((i,index)=>{
text += (index+1)+". "+i.name+" - ₹"+i.price+"\n";
total += i.price;
});

text += "\nTOTAL: ₹" + total;

let qr = getQR();

let w = window.open("");
w.document.write(`
<div style="font-family:Arial;padding:20px;text-align:center;">
<pre>${text}</pre>
<hr>
<h3>Scan to open store</h3>
<img src="${qr}" style="width:200px;height:200px;">
<p>Thank you for shopping</p>
</div>
`);
w.print();
}

/* LANGUAGE */
const t = {
en:{store:"Vishaldeep Medical Store",sub:"Trusted Pharmacy",doc:"Doctor Help",shop:"Shop Medicines"},
hi:{store:"विशालदीप मेडिकल स्टोर",sub:"विश्वसनीय फार्मेसी",doc:"डॉक्टर सहायता",shop:"दवाइयाँ"},
mr:{store:"विशालदीप मेडिकल स्टोअर",sub:"फार्मसी",doc:"डॉक्टर मदत",shop:"औषधे"}
};

function setLang(l){
document.getElementById("storeName").innerText = t[l].store;
document.getElementById("subtitle").innerText = t[l].sub;
document.getElementById("doctorBtn").innerText = t[l].doc;
document.getElementById("shopBtn").innerText = t[l].shop;
}

setLang("en");

</script>

</body>
</html>
