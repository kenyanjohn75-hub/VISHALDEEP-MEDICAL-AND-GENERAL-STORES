<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Store</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}
.header{background:#0a7d3c;color:white;text-align:center;padding:20px;}
.products{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.product{background:white;padding:10px;border-radius:10px;text-align:center;}
.product img{width:100%;height:120px;object-fit:cover;}
button{padding:8px;border:none;border-radius:8px;}
.green{background:#0a7d3c;color:white;}
.blue{background:#1976d2;color:white;}
</style>
</head>

<body>

<div class="header">
<h2>Vishaldeep Medical Store</h2>
</div>

<div id="products" class="products"></div>

<div id="cartBox" style="padding:10px;"></div>
<h3 id="total" style="padding:10px;"></h3>

<button class="green" onclick="checkout()">WhatsApp Order</button>
<button class="blue" onclick="downloadPDF()">Download PDF</button>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

let cart = [];

function display(){
let div=document.getElementById("products");
div.innerHTML="";

products.forEach((p,i)=>{
if(p.stock>0){
div.innerHTML+=`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<p>Qty: ${p.stock}</p>
<button onclick="add(${i})">Add</button>
</div>`;
}
});
}
display();

function add(i){
cart.push(products[i]);
showCart();
}

function showCart(){
let div=document.getElementById("cartBox");
let total=0;
div.innerHTML="";

cart.forEach(i=>{
total+=Number(i.price);
div.innerHTML+=`<p>${i.name} - ₹${i.price}</p>`;
});

document.getElementById("total").innerText="Total: ₹"+total;
}

function checkout(){
let msg="Order:\n";
let total=0;

cart.forEach((i,n)=>{
msg+=(n+1)+". "+i.name+" - ₹"+i.price+"\n";
total+=Number(i.price);
});

msg+="Total: "+total;

window.open("https://wa.me/919850752963?text="+encodeURIComponent(msg));
}

function downloadPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("VISHALDEEP MEDICAL STORE",10,10);

let y=20,total=0;

cart.forEach((i,n)=>{
doc.text(`${n+1}. ${i.name} - ₹${i.price}`,10,y);
y+=10;
total+=Number(i.price);
});

doc.text("TOTAL: "+total,10,y+10);

doc.save("receipt.pdf");
}

</script>

</body>
</html>
