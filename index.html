<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishaldeep Medical Store</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

.header{
background:linear-gradient(135deg,#0a7d3c,#1e88e5);
color:white;
text-align:center;
padding:20px;
}

.actions{display:flex;gap:10px;padding:10px;}
.actions button{flex:1;padding:12px;border:none;border-radius:10px;color:white;}
.blue{background:#1976d2;}
.green{background:#0a7d3c;}
.gray{background:#555;}

.search{width:90%;margin:10px auto;display:block;padding:12px;border-radius:20px;}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:120px;
object-fit:cover;
}

.price{color:#0a7d3c;font-weight:bold;}

.bottom-nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>Vishaldeep Medical Store</h2>
<p>Trusted Pharmacy</p>
</div>

<div class="actions">
<button class="blue" onclick="doctorHelp()">Help</button>
<button class="green" onclick="showShop()">Shop</button>
<button class="gray" onclick="window.location.href='admin.html'">Admin</button>
</div>

<input class="search" placeholder="Search medicines..." onkeyup="search(this.value)">

<div class="products" id="products"></div>

<div id="cartBox" style="padding:10px;"></div>
<h3 id="total"></h3>

<button style="width:90%;margin:10px;" onclick="checkout()">WhatsApp Order</button>
<button style="width:90%;margin:10px;background:#1976d2;color:white;" onclick="downloadPDF()">Download PDF</button>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

/* DISPLAY */
function display(list){
let div=document.getElementById("products");
div.innerHTML="";

list.forEach((p,i)=>{
if(p.stock>0){
div.innerHTML+=`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>
<p class="price">₹${p.price}</p>
<p>Stock: ${p.stock}</p>
<button onclick="add(${i})">Add</button>
</div>`;
}
});
}
display(products);

/* CART */
function add(i){
cart.push(products[i]);
showCart();
}

function showCart(){
let div=document.getElementById("cartBox");
let total=0;
div.innerHTML="";

cart.forEach(i=>{
total+=Number(i.price);
div.innerHTML+=`<p>${i.name} - ₹${i.price}</p>`;
});

document.getElementById("total").innerText="Total: ₹"+total;
}

/* CHECKOUT */
function checkout(){

if(cart.length===0)return alert("Cart empty");

let msg="VISHALDEEP MEDICAL ORDER\n\n";
let total=0;

let products = JSON.parse(localStorage.getItem("products")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];

cart.forEach(i=>{
msg+=i.name+" - ₹"+i.price+"\n";
total+=Number(i.price);

let p = products.find(x=>x.name===i.name);
if(p && p.stock>0){
p.stock -= 1;
}
});

localStorage.setItem("products",JSON.stringify(products));

sales.push({
date:new Date().toLocaleString(),
items:cart,
total:total
});

localStorage.setItem("sales",JSON.stringify(sales));

cart=[];
showCart();
display(products);

window.open("https://wa.me/919850752963?text="+encodeURIComponent(msg));
}

/* PDF */
function downloadPDF(){

if(cart.length===0)return alert("Cart empty");

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

doc.text("VISHALDEEP MEDICAL STORE",10,10);

let y=20,total=0;

cart.forEach(i=>{
doc.text(i.name+" - ₹"+i.price,10,y);
y+=10;
total+=Number(i.price);
});

doc.text("TOTAL: ₹"+total,10,y+10);

doc.save("receipt.pdf");
}

/* SEARCH */
function search(q){
display(products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())));
}

function showShop(){
products = JSON.parse(localStorage.getItem("products")) || [];
display(products);
}

function doctorHelp(){
window.open("https://wa.me/919850752963");
}

</script>

</body>
</html>
