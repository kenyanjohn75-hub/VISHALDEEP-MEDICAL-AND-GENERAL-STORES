<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishaldeep Medical Store</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

.header{
background:linear-gradient(135deg,#0a7d3c,#1e88e5);
color:white;
text-align:center;
padding:20px;
}

.header img{
width:70px;
height:70px;
border-radius:50%;
background:white;
padding:5px;
}

.lang{
display:flex;
justify-content:center;
gap:10px;
padding:10px;
background:#eee;
}

.lang button{
padding:6px 12px;
border:none;
border-radius:20px;
}

.actions{
display:flex;
gap:10px;
padding:10px;
}

.actions button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
color:white;
}

.blue{background:#1976d2;}
.green{background:#0a7d3c;}
.gray{background:#555;}

.upload-box{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
text-align:center;
}

footer{
background:#222;
color:white;
padding:15px;
text-align:center;
font-size:13px;
}
</style>
</head>

<body>

<!-- LANGUAGE SWITCH -->
<div class="lang">
<button onclick="setLang('en')">English</button>
<button onclick="setLang('hi')">हिंदी</button>
<button onclick="setLang('mr')">मराठी</button>
</div>

<!-- HEADER -->
<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Medical_cross_symbol.svg">
<h2 id="title">Vishaldeep Medical Store</h2>
<p id="subtitle">Trusted Pharmacy & Healthcare</p>
</div>

<!-- ACTIONS -->
<div class="actions">
<button class="blue" id="docBtn" onclick="consultDoctor()">Consult Doctor</button>
<button class="green" onclick="document.getElementById('rxFile').click()" id="uploadBtn">Upload Prescription</button>
<button class="gray" onclick="window.location.href='admin.html'">Admin</button>
</div>

<!-- UPLOAD -->
<div class="upload-box">
<h3 id="uploadTitle">Upload Prescription</h3>

<input type="file" id="rxFile" accept="image/*,application/pdf">

<p id="fileName"></p>

<button onclick="sendPrescription()" id="sendBtn"
style="padding:10px;background:#0a7d3c;color:white;border:none;border-radius:8px;">
Send to WhatsApp
</button>
</div>

<!-- FOOTER -->
<footer>
<b id="storeName">Vishaldeep Medical and General Store</b><br><br>

📍 <span id="address">
Yashwant Complex Shop No 11, Takali Vinchur, Lasalgaon - 422306
</span><br><br>

📞 WhatsApp: +91 9850752963<br>
👤 <span id="owner">Proprietor: Vishal Deepak Babre</span>
</footer>

<script>

let rxFile = null;

/* LANGUAGE DATA */
const lang = {
en:{
title:"Vishaldeep Medical Store",
subtitle:"Trusted Pharmacy & Healthcare",
doc:"Consult Doctor",
upload:"Upload Prescription",
send:"Send to WhatsApp",
uploadTitle:"Upload Prescription",
store:"Vishaldeep Medical and General Store",
address:"Yashwant Complex Shop No 11, Takali Vinchur, Lasalgaon - 422306",
owner:"Proprietor: Vishal Deepak Babre"
},
hi:{
title:"विशालदीप मेडिकल स्टोर",
subtitle:"विश्वसनीय फार्मेसी और स्वास्थ्य सेवा",
doc:"डॉक्टर से परामर्श",
upload:"प्रिस्क्रिप्शन अपलोड करें",
send:"व्हाट्सएप पर भेजें",
uploadTitle:"प्रिस्क्रिप्शन अपलोड करें",
store:"विशालदीप मेडिकल एंड जनरल स्टोर",
address:"यशवंत कॉम्प्लेक्स शॉप नं 11, टाकली विंचूर, लासलगाव - 422306",
owner:"प्रोप्राइटर: विशाल दीपक बाबरे"
},
mr:{
title:"विशालदीप मेडिकल स्टोअर",
subtitle:"विश्वसनीय फार्मसी आणि आरोग्य सेवा",
doc:"डॉक्टर सल्ला",
upload:"प्रिस्क्रिप्शन अपलोड करा",
send:"व्हाट्सअॅप वर पाठवा",
uploadTitle:"प्रिस्क्रिप्शन अपलोड करा",
store:"विशालदीप मेडिकल आणि जनरल स्टोअर",
address:"यशवंत कॉम्प्लेक्स शॉप नं 11, टाकळी विंचूर, लासलगाव - 422306",
owner:"प्रोप्रायटर: विशाल दीपक बाबरे"
}
};

/* SET LANGUAGE */
function setLang(l){
document.getElementById("title").innerText=lang[l].title;
document.getElementById("subtitle").innerText=lang[l].subtitle;
document.getElementById("docBtn").innerText=lang[l].doc;
document.getElementById("uploadBtn").innerText=lang[l].upload;
document.getElementById("sendBtn").innerText=lang[l].send;
document.getElementById("uploadTitle").innerText=lang[l].uploadTitle;
document.getElementById("storeName").innerText=lang[l].store;
document.getElementById("address").innerText=lang[l].address;
document.getElementById("owner").innerText=lang[l].owner;
}

/* DEFAULT LANGUAGE */
setLang('en');

/* DOCTOR */
function consultDoctor(){
window.open("https://wa.me/919850752963?text=Doctor%20Consultation%20Request","_blank");
}

/* FILE */
document.getElementById("rxFile").addEventListener("change",function(e){
rxFile = e.target.files[0];
document.getElementById("fileName").innerText = rxFile.name;
});

/* SEND */
function sendPrescription(){
if(!rxFile){
alert("Upload prescription first");
return;
}

window.open(
"https://wa.me/919850752963?text=" +
encodeURIComponent("📄 Prescription uploaded. Please check and suggest medicines."),
"_blank"
);
}

</script>

</body>
</html>
