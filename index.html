<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishaldeep Medical Store</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}

.header {
    background: linear-gradient(135deg,#0a7d3c,#1e88e5);
    color:white;
    text-align:center;
    padding:20px;
}

.header img {
    width:85px;
    height:85px;
    border-radius:50%;
    background:white;
    padding:6px;
    margin-bottom:10px;
}

.lang {
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:#eee;
}

.lang button {
    padding:6px 12px;
    border:none;
    border-radius:20px;
}

.search {
    width:90%;
    margin:10px auto;
    display:block;
    padding:12px;
    border-radius:20px;
    border:1px solid #ccc;
}

.actions {
    display:flex;
    gap:10px;
    padding:10px;
}

.actions button {
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    color:white;
}

.blue {background:#1976d2;}
.green {background:#0a7d3c;}
.gray {background:#555;}

.products {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.product {
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
    position:relative;
}

.product img {
    width:100%;
    height:120px;
    object-fit:cover;
}

.price {font-weight:bold; color:#0a7d3c;}

.rx {
    position:absolute;
    top:8px;
    left:8px;
    background:red;
    color:white;
    font-size:10px;
    padding:3px 6px;
    border-radius:5px;
}

.cart {padding:10px;}

.big-btn {
    width:90%;
    margin:8px auto;
    display:block;
    padding:12px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

.float-wa {
    position:fixed;
    bottom:80px;
    right:15px;
    background:#25D366;
    color:white;
    padding:12px;
    border-radius:50%;
    font-size:20px;
}

.bottom-nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:white;
    display:flex;
    justify-content:space-around;
    padding:10px;
    border-top:1px solid #ccc;
}
</style>
</head>

<body>

<div class="lang">
<button onclick="setLang('en')">English</button>
<button onclick="setLang('hi')">हिंदी</button>
<button onclick="setLang('mr')">मराठी</button>
</div>

<div class="header">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Medical_cross_symbol.svg">
<h2 id="storeName">Vishaldeep Medical Store</h2>
<p id="subtitle">Trusted Pharmacy</p>
</div>

<div class="actions">
<button class="blue" id="doctorBtn" onclick="doctorHelp()">Doctor Help</button>
<button class="green" id="shopBtn" onclick="showShop()">Shop Medicines</button>
<button class="gray" onclick="uploadPrescription()">Upload Rx</button>
</div>

<!-- CATEGORY FILTER -->
<div style="display:flex;gap:8px;padding:10px;overflow:auto;">
<button onclick="filterCategory('All')">All</button>
<button onclick="filterCategory('Pain Relief')">Pain Relief</button>
<button onclick="filterCategory('Cough & Cold')">Cough</button>
<button onclick="filterCategory('Antibiotics')">Antibiotics</button>
<button onclick="filterCategory('Vitamins')">Vitamins</button>
</div>

<input class="search" placeholder="Search medicines..." onkeyup="search(this.value)">

<div class="products" id="products"></div>

<div class="cart" id="cartBox"></div>
<h3 style="padding:10px;" id="total"></h3>

<button class="big-btn green" onclick="checkout()">💳 Pay Now (WhatsApp Order)</button>
<button class="big-btn gray" onclick="printReceipt()">🧾 Print Receipt</button>

<div class="bottom-nav">
<button onclick="showShop()">Shop</button>
<button onclick="showCart()">Cart</button>
</div>

<div class="float-wa" onclick="doctorHelp()">💬</div>

<input type="file" id="rxUpload" accept="image/*,application/pdf" style="display:none" onchange="handleUpload(event)">

<script>

/* PRODUCTS */
const products = [
{name:"Panadol (Paracetamol 500mg)",price:30,rx:false,category:"Pain Relief",stock:true,img:"https://www.panadol.com/content/dam/cf-consumer-healthcare/panadol/en_IN/products/panadol-advance-500mg.png"},
{name:"Brufen (Ibuprofen 400mg)",price:40,rx:false,category:"Pain Relief",stock:true,img:"https://www.mims.com/resources/drug/IN/image/brufen.jpg"},
{name:"Benylin Cough Syrup",price:120,rx:false,category:"Cough & Cold",stock:true,img:"https://www.benylin.com/content/dam/cf-consumer-healthcare/benylin/en_IN/products/benylin-cough-syrup.png"},
{name:"Augmentin (Amoxicillin)",price:150,rx:true,category:"Antibiotics",stock:false,img:"https://www.gsk.com/media/5920/augmentin-tablets.jpg"},
{name:"Azithral (Azithromycin)",price:180,rx:true,category:"Antibiotics",stock:true,img:"https://www.ale.mb.ca/wp-content/uploads/2019/08/azithromycin.jpg"},
{name:"Limcee Vitamin C",price:110,rx:false,category:"Vitamins",stock:true,img:"https://www.1mg.com/images/products/limcee-vitamin-c-tablet.jpg"}
];

let cart = [];
let rxFile = null;

/* DISPLAY */
function display(list){
let div = document.getElementById("products");
div.innerHTML = "";

list.forEach(p=>{
div.innerHTML += `
<div class="product">

${p.rx ? '<div class="rx">RX</div>' : ''}

<div style="position:absolute;top:8px;right:8px;
background:${p.stock ? '#0a7d3c' : 'red'};
color:white;font-size:10px;padding:3px 6px;border-radius:5px;">
${p.stock ? 'In Stock' : 'Out'}
</div>

<img src="${p.img}">

<h4>${p.name}</h4>
<p style="font-size:12px;color:#777;">${p.category}</p>
<p class="price">₹${p.price}</p>

<button ${!p.stock ? 'disabled style="background:#ccc;"' : ''}
onclick="add('${p.name}',${p.price})">
${p.stock ? 'Add' : 'Unavailable'}
</button>

</div>`;
});
}
display(products);

/* CART */
function add(name, price){
cart.push({name, price});
alert(name + " added to cart");
showCart();
}

function showCart(){
let div = document.getElementById("cartBox");
let total = 0;
div.innerHTML = "";

cart.forEach(i=>{
total += i.price;
div.innerHTML += `<p>${i.name} - ₹${i.price}</p>`;
});

document.getElementById("total").innerText = "Total: ₹" + total;
}

/* SEARCH */
function search(q){
let f = products.filter(p =>
p.name.toLowerCase().includes(q.toLowerCase())
);
display(f);
}

/* FILTER */
function filterCategory(cat){
if(cat==="All"){display(products);return;}
display(products.filter(p=>p.category===cat));
}

/* SHOP */
function showShop(){display(products);}

/* RX */
function uploadPrescription(){document.getElementById("rxUpload").click();}
function handleUpload(e){rxFile=e.target.files[0];alert("RX Uploaded: "+rxFile.name);}

/* WHATSAPP */
function doctorHelp(){
window.open("https://wa.me/919850752963","_blank");
}

/* QR */
function getQR(){
let url = encodeURIComponent(window.location.href);
return "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + url;
}

/* CHECKOUT */
function checkout(){
if(cart.length===0){alert("Cart is empty");return;}

let msg="🧾 Vishaldeep Medical Store Order\n\n";
let total=0;

cart.forEach((i,index)=>{
msg+=(index+1)+". "+i.name+" - ₹"+i.price+"\n";
total+=i.price;
});

msg+="\n💰 Total: ₹"+total;

if(rxFile){msg+="\n📄 RX Uploaded";}

msg+="\n\nScan QR:\n"+window.location.href;

window.open("https://wa.me/919850752963?text="+encodeURIComponent(msg),"_blank");
}

/* PRINT */
function printReceipt(){
if(cart.length===0){alert("Cart is empty");return;}

let total=0;
let text="VISHALDEEP MEDICAL STORE\n\n";

cart.forEach((i,index)=>{
text+=(index+1)+". "+i.name+" - ₹"+i.price+"\n";
total+=i.price;
});

text+="\nTOTAL: ₹"+total;

let qr=getQR();
let w=window.open("");

w.document.write(`
<html><body style="font-family:Arial;text-align:center;padding:20px;">
<pre>${text}</pre>
<hr>
<h3>Scan to open store</h3>
<img id="qrImg" src="${qr}" width="200">
<p>Thank you</p>
</body></html>
`);

w.document.close();

let img=w.document.getElementById("qrImg");
img.onload=function(){w.print();w.close();};

setTimeout(()=>{w.print();w.close();},3000);
}

/* LANGUAGE */
const t={
en:{store:"Vishaldeep Medical Store",sub:"Trusted Pharmacy",doc:"Doctor Help",shop:"Shop Medicines"},
hi:{store:"विशालदीप मेडिकल स्टोर",sub:"विश्वसनीय फार्मेसी",doc:"डॉक्टर सहायता",shop:"दवाइयाँ"},
mr:{store:"विशालदीप मेडिकल स्टोअर",sub:"फार्मसी",doc:"डॉक्टर मदत",shop:"औषधे"}
};

function setLang(l){
document.getElementById("storeName").innerText=t[l].store;
document.getElementById("subtitle").innerText=t[l].sub;
document.getElementById("doctorBtn").innerText=t[l].doc;
document.getElementById("shopBtn").innerText=t[l].shop;
}

setLang("en");

</script>

</body>
    </html>
