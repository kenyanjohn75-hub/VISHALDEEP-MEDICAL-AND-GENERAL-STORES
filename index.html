<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vishaldeep Medical Store</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5;}

.header{
background:linear-gradient(135deg,#0a7d3c,#1e88e5);
color:white;
text-align:center;
padding:20px;
}

.actions{
display:flex;
gap:10px;
padding:10px;
}

.actions button{
flex:1;
padding:12px;
border:none;
border-radius:10px;
color:white;
}

.blue{background:#1976d2;}
.green{background:#0a7d3c;}
.gray{background:#555;}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:10px;
text-align:center;
}

.product img{
width:100%;
height:120px;
object-fit:cover;
}

.cart{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h2>Vishaldeep Medical Store</h2>
<p>Trusted Pharmacy</p>
</div>

<!-- ACTIONS -->
<div class="actions">
<button class="blue" onclick="consult()">Consult Doctor</button>
<button class="green" onclick="showShop()">Shop Medicines</button>
<button class="gray" onclick="window.location.href='admin.html'">Admin</button>
</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="cart">
<h3>🛒 Cart</h3>
<div id="cartList"></div>
<h3 id="total">Total: ₹0</h3>

<button onclick="checkout()" style="background:#0a7d3c;color:white;padding:10px;width:100%;border:none;">
Checkout on WhatsApp
</button>

<button onclick="downloadPDF()" style="background:#1976d2;color:white;padding:10px;width:100%;border:none;margin-top:5px;">
Download Receipt
</button>
</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let cart = [];

/* SHOW PRODUCTS */
function showShop(){
products = JSON.parse(localStorage.getItem("products")) || [];

let div=document.getElementById("products");
div.innerHTML="";

products.forEach((p,i)=>{
if(p.stock>0){
div.innerHTML+=`
<div class="product">
<img src="${p.img}">
<h4>${p.name}</h4>
<p>₹${p.price}</p>
<p>Stock: ${p.stock}</p>
<button onclick="add(${i})">Add to Cart</button>
</div>`;
}
});
}

showShop();

/* ADD TO CART */
function add(i){
cart.push(products[i]);
renderCart();
}

/* CART DISPLAY */
function renderCart(){
let div=document.getElementById("cartList");
let total=0;
div.innerHTML="";

cart.forEach((c,i)=>{
total+=Number(c.price);
div.innerHTML+=`<p>${c.name} - ₹${c.price}</p>`;
});

document.getElementById("total").innerText="Total: ₹"+total;
}

/* CHECKOUT (WHATSAPP ORDER) */
function checkout(){

if(cart.length===0)return alert("Cart is empty");

let msg="🧾 VISHALDEEP MEDICAL ORDER\n\n";
let total=0;

let products = JSON.parse(localStorage.getItem("products")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];

cart.forEach((c)=>{
msg+=c.name+" - ₹"+c.price+"\n";
total+=Number(c.price);

/* stock deduction */
let p = products.find(x=>x.name===c.name);
if(p && p.stock>0)p.stock--;
});

localStorage.setItem("products",JSON.stringify(products));

sales.push({
date:new Date().toLocaleString(),
items:cart,
total:total
});

localStorage.setItem("sales",JSON.stringify(sales));

window.open(
"https://wa.me/919850752963?text="+encodeURIComponent(msg)
);

cart=[];
renderCart();
showShop();
}

/* PDF RECEIPT WITH QR + DETAILS */
function downloadPDF(){

if(cart.length===0)return alert("Cart empty");

const { jsPDF } = window.jspdf;
let doc=new jsPDF();

let y=10,total=0;

doc.setFontSize(14);
doc.text("VISHALDEEP MEDICAL & GENERAL STORE",10,y);
y+=8;

doc.setFontSize(10);
doc.text("Yashwant Complex Shop No 11",10,y);y+=6;
doc.text("Takali Vinchur, Lasalgaon - 422306",10,y);y+=6;
doc.text("WhatsApp: +91 9850752963",10,y);y+=10;

cart.forEach((c,i)=>{
doc.text((i+1)+". "+c.name+" - ₹"+c.price,10,y);
y+=7;
total+=Number(c.price);
});

doc.text("TOTAL: ₹"+total,10,y+10);

/* QR CODE */
let qr = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://wa.me/919850752963";
doc.addImage(qr,"PNG",130,10,50,50);

doc.save("receipt.pdf");
}

/* CONSULT */
function consult(){
window.open("https://wa.me/919850752963?text=Doctor%20Consultation%20Request");
}

</script>

</body>
</html>
