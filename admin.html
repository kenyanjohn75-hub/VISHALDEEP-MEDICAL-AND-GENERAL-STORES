<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#f5f5f5;}
.box{background:white;padding:10px;margin:10px;border-radius:10px;}
input{padding:8px;margin:5px;width:90%;}
button{padding:8px;background:#0a7d3c;color:white;border:none;}
</style>
</head>

<body>

<h2 style="text-align:center;">Admin Panel</h2>

<div class="box">
<input type="password" id="pass" placeholder="Enter admin password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;" class="box">

<h3>Add Product</h3>

<input id="name" placeholder="Product name">
<input id="price" placeholder="Price">
<input id="qty" placeholder="Quantity">
<input id="img" placeholder="Image URL">

<button onclick="addProduct()">Add</button>

<hr>

<div id="list"></div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function login(){
if(document.getElementById("pass").value==="1234"){
document.getElementById("panel").style.display="block";
load();
}else{
alert("Wrong password");
}
}

function addProduct(){

let p={
name:document.getElementById("name").value,
price:document.getElementById("price").value,
stock:document.getElementById("qty").value,
img:document.getElementById("img").value
};

products.push(p);
localStorage.setItem("products",JSON.stringify(products));

load();
}

function load(){
let div=document.getElementById("list");
div.innerHTML="";

products.forEach((p,i)=>{
div.innerHTML+=`
<div class="box">
${p.name} - ₹${p.price} (Qty:${p.stock})
</div>`;
});
}

</script>

</body>
  </html>
