<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
.box{background:white;margin:10px;padding:10px;border-radius:10px;}
input{width:90%;padding:8px;margin:5px;}
button{padding:10px;background:#0a7d3c;color:white;border:none;}
.red{background:red;}
</style>
</head>

<body>

<h2 style="text-align:center;">ADMIN PANEL</h2>

<div class="box">
<input type="password" id="pass" placeholder="Admin password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">

<div class="box">
<h3>Add Medicine</h3>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">

<!-- 🔥 IMAGE UPLOAD (FIXED) -->
<input type="file" id="imgInput" accept="image/*">
<br>
<img id="preview" style="width:120px;margin-top:10px;display:none;border:1px solid #ccc;padding:5px;">

<button onclick="addProduct()">Add Product</button>
</div>

<div class="box">
<h3>Product List</h3>
<div id="list"></div>
</div>

<div class="box">
<h3>Sales</h3>
<div id="sales"></div>
</div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];

let imageBase64 = "";

/* LOGIN */
function login(){
if(document.getElementById("pass").value==="1234"){
document.getElementById("panel").style.display="block";
load();
loadSales();
}else alert("Wrong password");
}

/* 🔥 FIXED IMAGE UPLOAD */
document.getElementById("imgInput").addEventListener("change",function(e){

let file = e.target.files[0];

if(!file)return;

let reader = new FileReader();

reader.onload=function(){
imageBase64 = reader.result;
let img = document.getElementById("preview");
img.src = imageBase64;
img.style.display="block";
};

reader.readAsDataURL(file);
});

/* ADD PRODUCT */
function addProduct(){

if(!name.value || !price.value || !stock.value){
alert("Fill all fields");
return;
}

products.push({
name:name.value,
price:Number(price.value),
stock:Number(stock.value),
img:imageBase64 || "https://via.placeholder.com/150"
});

localStorage.setItem("products",JSON.stringify(products));

/* RESET */
name.value="";
price.value="";
stock.value="";
imageBase64="";
preview.style.display="none";
imgInput.value="";

load();
}

/* LOAD PRODUCTS */
function load(){
products = JSON.parse(localStorage.getItem("products")) || [];

let div=document.getElementById("list");
div.innerHTML="";

products.forEach((p,i)=>{
div.innerHTML+=`
<div class="box">
<img src="${p.img}" style="width:80px;height:80px;object-fit:cover;"><br>
<b>${p.name}</b><br>
₹${p.price} | Stock: ${p.stock}
</div>`;
});
}

/* SALES */
function loadSales(){
sales = JSON.parse(localStorage.getItem("sales")) || [];

let div=document.getElementById("sales");
div.innerHTML="";

let total=0;

sales.forEach(s=>{
total+=s.total;
div.innerHTML+=`
<div class="box">
${s.date} - ₹${s.total}
</div>`;
});

div.innerHTML+=`<h3>Total Revenue: ₹${total}</h3>`;
}

</script>

</body>
</html>
