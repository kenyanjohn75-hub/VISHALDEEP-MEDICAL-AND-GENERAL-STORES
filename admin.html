<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;}
.box{background:white;margin:10px;padding:10px;border-radius:10px;}
input{width:90%;padding:8px;margin:5px;}
button{padding:10px;background:#0a7d3c;color:white;border:none;}
.red{background:red;}
</style>
</head>

<body>

<h2 style="text-align:center;">ADMIN DASHBOARD</h2>

<div class="box">
<input type="password" id="pass" placeholder="Admin password">
<button onclick="login()">Login</button>
</div>

<div id="panel" style="display:none;">

<div class="box">
<h3>Add Product</h3>

<input id="name" placeholder="Name">
<input id="price" placeholder="Price">
<input id="stock" placeholder="Stock">

<input type="file" id="imgFile" accept="image/*">
<br>
<img id="preview" style="width:100px;margin-top:5px;">

<button onclick="add()">Add Product</button>
</div>

<div class="box">
<h3>Products</h3>
<div id="list"></div>
</div>

<div class="box">
<h3>📊 Sales Dashboard</h3>
<div id="sales"></div>
</div>

</div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];
let base64Image = "";

/* LOGIN */
function login(){
if(document.getElementById("pass").value==="1234"){
document.getElementById("panel").style.display="block";
load();
loadSales();
}else alert("Wrong password");
}

/* IMAGE UPLOAD */
document.getElementById("imgFile").addEventListener("change",function(e){
let file = e.target.files[0];
let reader = new FileReader();

reader.onload=function(){
base64Image = reader.result;
document.getElementById("preview").src = base64Image;
};

reader.readAsDataURL(file);
});

/* ADD PRODUCT */
function add(){

products.push({
name:name.value,
price:Number(price.value),
stock:Number(stock.value),
img:base64Image
});

localStorage.setItem("products",JSON.stringify(products));

base64Image="";
preview.src="";

load();
}

/* LOAD PRODUCTS */
function load(){
products = JSON.parse(localStorage.getItem("products")) || [];

let div=document.getElementById("list");
div.innerHTML="";

products.forEach((p,i)=>{
div.innerHTML+=`
<div class="box">
${p.name} - ₹${p.price} (Stock:${p.stock})
</div>`;
});
}

/* SALES */
function loadSales(){
sales = JSON.parse(localStorage.getItem("sales")) || [];

let div=document.getElementById("sales");
div.innerHTML="";

let total=0;

sales.forEach(s=>{
total+=s.total;
div.innerHTML+=`<p>${s.date} - ₹${s.total}</p>`;
});

div.innerHTML+=`<h3>Total Revenue: ₹${total}</h3>`;
}

</script>

</body>
  </html>
